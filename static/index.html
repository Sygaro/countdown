<!doctype html>
<html lang="no">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Countdown · Visning</title>
  <link rel="stylesheet" href="/static/css/ui.css"/>
  <style>
    /* Kun visning */
    :root { --digits-weight: 800; }
    html,body { height: 100%; }
    body { margin:0; background:#0b0f14; overflow:hidden; }
    .stage {
      position:relative; inset:0; height:100%; width:100%;
      display:flex; flex-direction:column; align-items:center; justify-content:center; gap:2vh;
      padding:4vh 4vw;
    }
    .messages { width: 100%; text-align:center; display:flex; flex-direction:column; gap:1vh; }
    .digits {
      font-family: "Inter", "Inter var", "IBM Plex Sans", "SF Pro Text", "Segoe UI",
                   Roboto, "Helvetica Neue", Arial, "Noto Sans", "Liberation Sans", sans-serif;
      font-weight: var(--digits-weight);
      letter-spacing: 0.06em;
      line-height: 1;
      user-select: none;
      font-variant-numeric: tabular-nums;            /* <- tabulære tall */
      -moz-font-feature-settings: "tnum" 1;
      -webkit-font-feature-settings: "tnum" 1;
      font-feature-settings: "tnum" 1;
      will-change: contents;
    }
    .hidden { display:none !important; }

    /* Blink */
    @keyframes pulse { 0%,100% {opacity:1} 50% {opacity:.25} }
    .blink { animation: pulse 1s steps(2, end) infinite; }

    /* Fullskjermknapp: auto-gjem ved hover og i fullscreen */
    .fs-btn {
      position: fixed; right: 10px; top: 10px; z-index: 20;
      padding: 8px 12px; border-radius: 10px; border:1px solid var(--border);
      background: rgba(12,16,24,.7); color:#e6edf3; cursor:pointer; opacity:.0; transition: opacity .2s ease;
    }
    body:hover .fs-btn { opacity: 1; }
    :fullscreen .fs-btn { display: none; }          /* CSS-hint; JS håndhever også */
    :-webkit-full-screen .fs-btn { display: none; } /* webkit-prefiks */
    
    .err {
      position: absolute; left: 0; right: 0; bottom: 0;
      padding: 8px 12px; background: rgba(255, 107, 107, .12); color:#ffb3b3; font-size:.9rem;
      border-top:1px solid rgba(255,255,255,.07);
    }
  </style>
</head>
<body>
  <button id="btn_fs" class="fs-btn" title="Fullskjerm">⤢ Fullskjerm</button>

  <div id="stage" class="stage">
    <div id="msg_above" class="messages hidden">
      <div id="msg_primary_top"></div>
      <div id="msg_secondary_top"></div>
    </div>

    <div id="digits" class="digits">00:00</div>

    <div id="msg_below" class="messages hidden">
      <div id="msg_primary_bottom"></div>
      <div id="msg_secondary_bottom"></div>
    </div>

    <div id="screen_layer" class="hidden"></div>
    <div id="err" class="err hidden">(ingen feil)</div>
  </div>

  <script src="/static/js/view.js"></script>
</body>
</html>
