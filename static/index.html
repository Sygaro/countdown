<!doctype html>
<html lang="no">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>Countdown · Visning</title>
  <link rel="stylesheet" href="/static/css/ui.css"/>
  <style>
    /* Viktig for stabil posisjonering og layout i stopp-skjerm */
    #view_screen { position: relative; display:none; }
    #screen_clock { position: absolute; display:none; font-weight:800; }
    #screen_inner { width:100%; height:100%; display:flex; align-items:center; justify-content:center; }
    /* Debug */
    #dbg { position:fixed; left:8px; bottom:8px; font:12px/1.3 system-ui, sans-serif; background:rgba(0,0,0,.55); color:#e6edf3; padding:6px 8px; border-radius:8px; border:1px solid rgba(255,255,255,.1); z-index:10; }
    #dbg code{font-family:ui-monospace, SFMono-Regular, Menlo, Consolas, "Liberation Mono", monospace}
  </style>
</head>
<body class="center fill">
  <button id="btn_fullscreen" class="fs-btn" title="Fullskjerm">⛶ Fullskjerm</button>

  <div id="view_countdown" class="center fill" style="flex-direction:column;gap:2vh;display:none">
    <div id="msgs_above" class="muted" style="display:none;text-align:center">
      <div id="msg_primary_above"></div>
      <div id="msg_secondary_above"></div>
    </div>

    <div id="digits" class="big">00:00</div>

    <div id="msgs_below" class="muted" style="display:none;text-align:center">
      <div id="msg_primary_below"></div>
      <div id="msg_secondary_below"></div>
    </div>
  </div>

  <div id="view_screen" class="screen">
    <div id="screen_inner"></div>
    <div id="screen_clock"></div>
  </div>

  <script>
    (function(){
      const $ = (s)=>document.querySelector(s);
      const state = { cfg:null, tick:null, lastCfgRev:0, clockTimer:null };
      const qs = new URLSearchParams(location.search);
      const isKiosk = qs.get("kiosk")==="1";
      const wantDebug = qs.get("debug")==="1";

      const fmtMMSS = ms => { const neg=ms<0?"-":""; ms=Math.abs(ms); const t=Math.floor(ms/1000), m=Math.floor(t/60), s=t%60; return `${neg}${m}:${String(s).padStart(2,"0")}`; };
      const fmtHMS  = ms => { const neg=ms<0?"-":""; ms=Math.abs(ms); const t=Math.floor(ms/1000), h=Math.floor(t/3600), r=t%3600, m=Math.floor(r/60), s=r%60; const pad=n=>String(n).padStart(2,"0"); return `${neg}${h}:${pad(m)}:${pad(s)}`; };
      const hex2rgb = h => { const m=/^#?([a-f\d]{2})([a-f\d]{2})([a-f\d]{2})$/i.exec((h||"").trim()); if(!m) return "0,0,0"; return `${parseInt(m[1],16)}, ${parseInt(m[2],16)}, ${parseInt(m[3],16)}`; };

      function applyDigitsSize(useHMS){
        const base = Number(state.cfg?.theme?.digits?.size_vw ?? 14);
        const factor = useHMS ? 0.86 : 1.0;
        $("#digits").style.fontSize = `${(base*factor).toFixed(2)}vmin`;
      }
      function applyMessageStyles(){
        const p = state.cfg?.theme?.messages?.primary   || {};
        const s = state.cfg?.theme?.messages?.secondary || {};
        const set = (sel, m)=> { const el=$(sel); if(!el) return; el.style.fontSize   = `${Number(m.size_rem ?? 1.0)}rem`; el.style.fontWeight = String(Number(m.weight ?? 400)); el.style.color = String(m.color ?? '#9aa4b2'); };
        ["#msg_primary_above","#msg_primary_below"].forEach(sel=>set(sel,p));
        ["#msg_secondary_above","#msg_secondary_below"].forEach(sel=>set(sel,s));
      }

      function applyThemeBackground(rootEl, bg){
        const mode = String(bg?.mode || "solid").toLowerCase();

        // Full reset hver gang (hindrer "firkant"/lekk fra tidligere modus)
        rootEl.style.background = "";
        rootEl.style.backgroundSize = "";
        rootEl.style.backgroundPosition = "";
        rootEl.style.backgroundRepeat = "";

        if (mode === "solid"){
          rootEl.style.background = bg.solid?.color || "#0b0f14";
          return;
        }

        if (mode === "gradient"){
          const g = bg.gradient || {};
          const angle = Number(g.angle_deg ?? 180);
          rootEl.style.background = `linear-gradient(${angle}deg, ${g.from || "#142033"}, ${g.to || "#0b0f14"})`;
          return;
        }

        if (mode === "image"){
          const im = bg.image || {};
          const tint = im.tint || {};
          const hasTint = Number(tint.opacity ?? 0) > 0;
          const tintLayer = hasTint ? `linear-gradient(rgba(${hex2rgb(tint.color || "#000")}, ${Number(tint.opacity)}), rgba(${hex2rgb(tint.color || "#000")}, ${Number(tint.opacity)})), ` : "";
          const url = im.url ? `url("${im.url}")` : "none";

          // NB: ingen rootEl.opacity — vi bevarer klokke/innhold lysstyrke
          rootEl.style.background = `${tintLayer}${url}`;
          rootEl.style.backgroundSize = im.fit || "cover";
          rootEl.style.backgroundPosition = "center";
          rootEl.style.backgroundRepeat = "no-repeat";
          return;
        }
      }

      function applyCountdown(){
        $("#view_screen").style.display = "none";
        const root = $("#view_countdown");
        root.style.display = "flex";
        applyThemeBackground(document.body, state.cfg?.theme?.background);

        if (state.clockTimer){ clearInterval(state.clockTimer); state.clockTimer=null; }
        $("#screen_clock").style.display="none";

        applyMessageStyles();

        const c=state.cfg, t=state.tick;
        const thresholdMs=(c.hms_threshold_minutes??60)*60*1000;
        const msActive=(t.state==="countdown"||t.state==="overrun");
        const ms = msActive ? t.signed_display_ms : 0;

        const useHMS = Math.abs(ms) >= thresholdMs;
        applyDigitsSize(useHMS);

        const digits = $("#digits");
        digits.textContent = useHMS ? fmtHMS(ms) : fmtMMSS(ms);

        let color = c.color_normal;
        if (c.use_phase_colors) {
          if (t.state === "overrun" || t.signed_display_ms < 0) color = c.color_over || c.color_alert;
          else if (t.mode === "alert") color = c.color_alert;
          else if (t.mode === "warn")  color = c.color_warn;
        }
        digits.style.color = color;
        digits.classList.toggle("blink", !!(c.use_blink && t.blink));

        const targetText = (c.show_target_time && t.target_hhmm) ? ` ${t.target_hhmm}` : "";
        const prim = (c.show_message_primary ? (c.message_primary||"") : "") + ((c.target_time_after==="primary") ? targetText : "");
        const sec  = (c.show_message_secondary ? (c.message_secondary||"") : "") + ((c.target_time_after==="secondary") ? targetText : "");

        const above = c.messages_position === "above";
        $("#msgs_above").style.display = above ? "block" : "none";
        $("#msgs_below").style.display = above ? "none"  : "block";
        $("#msg_primary_above").textContent   = above ? prim : "";
        $("#msg_secondary_above").textContent = above ? sec  : "";
        $("#msg_primary_below").textContent   = !above ? prim : "";
        $("#msg_secondary_below").textContent = !above ? sec  : "";
      }

      function applyScreen(){
        const sc = state.cfg.screen || {};
        $("#view_countdown").style.display = "none";

        const root = $("#view_screen");
        root.style.display = "flex";
        root.style.alignItems = "center";
        root.style.justifyContent = "center";

        // Velg bakgrunn (theme eller egen)
        const activeBg = sc.use_theme_background ? (state.cfg?.theme?.background) : (sc.background || {mode:"solid",solid:{color:"#0b0f14"}});
        applyThemeBackground(root, activeBg);

        // Klokke – forankret til root
        const clk = sc.clock || {};
        const clkEl = $("#screen_clock");
        if (clkEl && clkEl.parentElement !== root) root.appendChild(clkEl);

        if (clk.show) {
          clkEl.style.display = "block";
          // Reset posisjon – forhindrer “speilvendt”/forskyvning
          clkEl.style.top = clkEl.style.right = clkEl.style.bottom = clkEl.style.left = "auto";
          clkEl.style.transform = "none";

          const pos = String(clk.position || "top-right");
          if (pos === "top-left")         { clkEl.style.top = "3vh";    clkEl.style.left = "4vw"; }
          else if (pos === "top-right")   { clkEl.style.top = "3vh";    clkEl.style.right = "4vw"; }
          else if (pos === "bottom-left") { clkEl.style.bottom = "3vh"; clkEl.style.left = "4vw"; }
          else if (pos === "bottom-right"){ clkEl.style.bottom = "3vh"; clkEl.style.right = "4vw"; }
          else if (pos === "top")         { clkEl.style.top = "3vh";    clkEl.style.left = "50%"; clkEl.style.transform = "translateX(-50%)"; }
          else if (pos === "bottom")      { clkEl.style.bottom = "3vh"; clkEl.style.left = "50%"; clkEl.style.transform = "translateX(-50%)"; }
          else if (pos === "center")      { clkEl.style.top = "50%";    clkEl.style.left = "50%"; clkEl.style.transform = "translate(-50%,-50%)"; }
          else                             { clkEl.style.top = "3vh";    clkEl.style.right = "4vw"; }

          clkEl.style.color = clk.color || "#e6edf3";
          clkEl.style.fontSize = `${Math.max(6, Math.min(30, Number(clk.size_vh || 12)))}vh`;

          if (state.clockTimer) { clearInterval(state.clockTimer); state.clockTimer = null; }
          const updateClock = () => {
            const d = new Date();
            const HH = String(d.getHours()).padStart(2,"0");
            const MM = String(d.getMinutes()).padStart(2,"0");
            const SS = String(d.getSeconds()).padStart(2,"0");
            clkEl.textContent = clk.with_seconds ? `${HH}:${MM}:${SS}` : `${HH}:${MM}`;
          };
          updateClock();
          state.clockTimer = setInterval(updateClock, clk.with_seconds ? 1000 : 5000);
        } else {
          clkEl.style.display = "none";
          if (state.clockTimer) { clearInterval(state.clockTimer); state.clockTimer = null; }
        }

        // Innhold
        const inner = $("#screen_inner");
        inner.innerHTML = "";

        // Blackout = full sort skjerm
        if (sc.type === "blackout") {
          root.style.background = "#000";
          return;
        }

        const activeBgMode = String(activeBg?.mode || "solid");

        // Hindre dobbelt-bilde: tegn innhold=bilde bare hvis bakgrunn IKKE er image
        if (sc.type === "image" && activeBgMode !== "image") {
          const wrap = document.createElement("div");
          wrap.style.position = "relative";
          wrap.style.maxWidth = "90vw";
          wrap.style.maxHeight = "80vh";

          const img = document.createElement("img");
          img.src = sc.image_url || "";
          img.style.objectFit = sc.image_fit || "cover";
          img.style.width = "100%";
          img.style.height = "100%";
          img.style.opacity = String((sc.image_opacity ?? 100)/100);

          wrap.appendChild(img);
          inner.appendChild(wrap);
          return;
        }

        if (sc.type === "text") {
          const div = document.createElement("div");
          div.className = "text";
          div.textContent = sc.text || "Pause";
          div.style.color = sc.text_color || "#fff";
          div.style.fontSize = `${Math.max(4, Math.min(30, Number(sc.font_vh ?? 10)))}vh`;
          inner.appendChild(div);
        }
      }

      async function fetchConfig(){
        const r = await fetch("/api/config"); const js = await r.json();
        state.cfg = js.config; state.lastCfgRev = js.config._updated_at || 0;
        sendHeartbeat();
      }
      async function firstLoad(){
        await fetchConfig();
        const r = await fetch("/tick"); state.tick = await r.json();
        render();
        sendHeartbeat();
        if (wantDebug) mountDebug();
      }
      async function pollTick(){
        const r = await fetch("/tick"); const t = await r.json();
        state.tick = t;
        if ((t.cfg_rev||0) !== state.lastCfgRev) await fetchConfig();
        render(true);
        if (wantDebug) updateDebug();
      }

      function render(){
        const mode = (state.cfg?.mode) || "daily";
        if (mode === "screen") applyScreen(); else applyCountdown();
      }

      // Debug overlay
      let dbgEl=null;
      function mountDebug(){ dbgEl=document.createElement("div"); dbgEl.id="dbg"; document.body.appendChild(dbgEl); updateDebug(); }
      function updateDebug(){
        const sc = state.cfg?.screen||{};
        const bg = sc.use_theme_background ? (state.cfg?.theme?.background) : (sc.background || {mode:"—"});
        dbgEl.innerHTML =
          `<div>mode=<code>${state.cfg?.mode}</code> · phase=<code>${state.tick?.mode}/${state.tick?.state}</code></div>`+
          `<div>screen.type=<code>${sc.type}</code> use_theme_bg=<code>${!!sc.use_theme_background}</code> bg.mode=<code>${bg?.mode}</code></div>`+
          `<div>clock: pos=<code>${sc.clock?.position}</code> secs=<code>${!!sc.clock?.with_seconds}</code> size_vh=<code>${sc.clock?.size_vh}</code></div>`;
      }

      // Heartbeat
      function sendHeartbeat(){
        const payload = JSON.stringify({ rev: state.lastCfgRev, page: "view" });
        if (navigator.sendBeacon) {
          const blob = new Blob([payload], {type: "application/json"});
          navigator.sendBeacon("/debug/view-heartbeat", blob);
        } else {
          fetch("/debug/view-heartbeat",{method:"POST",headers:{"Content-Type":"application/json"},body:payload}).catch(()=>{});
        }
      }
      setInterval(sendHeartbeat, 10000);

      // Fullskjerm-knapp: kun synlig når IKKE kiosk og IKKE i fullscreen
      const fsBtn = $("#btn_fullscreen");
      function inFullscreen(){ return !!(document.fullscreenElement || document.webkitFullscreenElement || document.msFullscreenElement); }
      function updateFsBtn(){ fsBtn.style.display = (isKiosk || inFullscreen()) ? "none" : "inline-block"; fsBtn.style.opacity = "1"; }
      ["fullscreenchange","webkitfullscreenchange","MSFullscreenChange"].forEach(ev=>document.addEventListener(ev, updateFsBtn));
      fsBtn.addEventListener("click", async () => { try { if (!document.fullscreenElement) await document.documentElement.requestFullscreen(); else await document.exitFullscreen(); } catch (e) {} });

      // Init
      updateFsBtn();
      firstLoad().catch(console.error);
      setInterval(pollTick, 1000);
    })();
  </script>
</body>
</html>
