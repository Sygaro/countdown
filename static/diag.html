<!doctype html>
<html lang="no">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Countdown · Diagnose</title>
    <link rel="stylesheet" href="/static/css/ui.css" />
    <link rel="stylesheet" href="/static/css/diag.css" />
  </head>
  <body>
    <header>
      <h1>Diagnose</h1>
      <nav>
        <a href="/">Visning</a>
        <a href="/admin">Admin</a>
        <a class="active" href="/diag">Diagnose</a>
        <a href="/about">Om</a>
      </nav>
    </header>

    <main class="grid">
      <!-- Nedtelling -->
      <section class="card">
        <h2>Nedtelling (live)</h2>
        <div id="countdown" class="big">00:00</div>
        <div id="phase" class="muted"></div>
        <div id="meta" class="muted"></div>
        <div id="both" class="muted"></div>
        <pre id="live" class="mono">(live)</pre>
        <div style="margin-top: 0.5rem; display: flex; gap: 0.5rem; align-items: center">
          <button id="refresh">Oppdater</button>
          <span id="lat" class="chip">latency: — ms</span>
        </div>
      </section>

      <!-- Debug -->
      <section class="card">
        <h2>Debug</h2>
        <div style="display: flex; gap: 0.5rem; flex-wrap: wrap; margin-bottom: 0.5rem">
          <button data-endpoint="/debug/whoami">/debug/whoami</button>
          <button data-endpoint="/api/config">/api/config</button>
          <button data-endpoint="/debug/selftest">/debug/selftest</button>
          <button data-endpoint="/debug/view-heartbeat">/debug/view-heartbeat</button>
        </div>
        <pre id="raw" class="mono">(tom)</pre>
      </section>

      <!-- Selvtest -->
      <section class="card">
        <h2>Selvtest</h2>
        <ul id="selftest"></ul>
        <button id="run_selftest">Kjør selvtest</button>
      </section>
    </main>

    <script type="module" src="/static/js/diag.js"></script>
  </body>
</html>
