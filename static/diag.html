<!-- static/diag.html -->
<!doctype html>
<html lang="no">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <title>Countdown · Diagnose</title>
    <link rel="stylesheet" href="/static/css/ui.css" />
    <style>
      body {
        font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
        padding: 1rem;
        background: #0b0f14;
        color: #e6edf3;
      }
      h1 {
        font-size: 1.4rem;
        margin-bottom: 1rem;
      }
      .grid {
        display: grid;
        grid-template-columns: 200px 1fr;
        gap: 6px 10px;
        align-items: center;
      }
      .mono {
        font-family: ui-monospace, SFMono-Regular, Menlo, Consolas, monospace;
      }
      .json {
        white-space: pre;
        background: #0b1020;
        color: #d7e7ff;
        border-radius: 10px;
        padding: 10px;
        margin-top: 1rem;
        max-height: 400px;
        overflow: auto;
      }
    </style>
  </head>
  <body>
    <h1>Diagnose – Countdown</h1>

    <div class="grid mono">
      <div>State</div><div id="dg-state">—</div>
      <div>Phase</div><div id="dg-phase">—</div>
      <div>Mode</div><div id="dg-mode">—</div>
      <div>Server now_ms</div><div id="dg-now">—</div>
      <div>Target ms</div><div id="dg-target">—</div>
      <div>Target HH:MM</div><div id="dg-thhmm">—</div>
      <div>Display mm:ss</div><div id="dg-disp">—</div>
      <div>warn_ms</div><div id="dg-warn">—</div>
      <div>alert_ms</div><div id="dg-alert">—</div>
      <div>overrun_ms</div><div id="dg-overrun">—</div>
      <div>Blink</div><div id="dg-blink">—</div>
      <div>RTT</div><div id="dg-rtt">—</div>
    </div>

    <div class="json mono" id="diag-raw">{}</div>

    <script src="/static/js/ui.js" type="module"></script>
    <script src="/static/js/diag.js" type="module"></script>
    <script src="/static/js/diag_widget.js"></script>
  </body>
</html>
